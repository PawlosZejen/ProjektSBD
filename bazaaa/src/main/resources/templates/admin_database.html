<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Baza danych</title>
</head>
<body>

<h1>Lista tabel</h1>

<table border="1">
    <tr>
        <th>Nazwa tabeli</th>
        <th>Akcja</th>
    </tr>

    <tr th:each="table : ${tables}">
        <td th:text="${table}"></td>
        <td>
            <a th:href="@{'/admin/baza/' + ${table}}">Otwórz</a>
        </td>
    </tr>
</table>

</body>
</html>
